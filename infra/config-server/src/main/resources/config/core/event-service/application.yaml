server:
  port: 0

spring:
  datasource:
    url: jdbc:postgresql://localhost:6542/ewmdb
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: core_events
  sql:
    init:
      mode: always  # Автоматически выполняет schema.sql при старте
  http:
    logging:
      include-headers: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

# Настройки логирования обработчика ошибок
api:
  log:
    stacktrace: true

# gRPC-клиенты для recommendation-сервисов
grpc:
  client:
    collector:
      address: 'discovery:///collector'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext
    analyzer:
      address: 'discovery:///analyzer'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext
