# Конфигурация event-service
spring:
  datasource:
    url: jdbc:postgresql://localhost:6542/ewmdb
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 0

# gRPC-клиенты для общения с recommendation-сервисами
grpc:
  client:
    collector:
      address: 'discovery:///collector'
      negotiationType: plaintext
    analyzer:
      address: 'discovery:///analyzer'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext
