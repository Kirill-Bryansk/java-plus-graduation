spring:
  cloud:
    gateway:
      discovery:
        # Автоматически создавать маршруты на основе зарегистрированных сервисов
        locator:
          enabled: true
      routes:
        # ==================== REQUEST-SERVICE ====================
        # Заявки пользователя на участие
        - id: request_route_user
          uri: lb://request-service
          predicates:
            - Path=/users/*/requests/**
        # Заявки на участие в событии (для инициатора)
        - id: request_route_event
          uri: lb://request-service
          predicates:
            - Path=/users/*/events/*/requests/**

        # ==================== RATING-SERVICE ====================
        # Оценки событий (LIKE/DISLIKE)
        - id: rating_route
          uri: lb://rating-service
          predicates:
            - Path=/users/*/events/*/ratings/**

        # ==================== EVENT-SERVICE ====================
        # Администрирование событий
        - id: event_route_admin
          uri: lb://event-service
          predicates:
            - Path=/admin/events/**
        # Управление событиями пользователя
        - id: event_route_user
          uri: lb://event-service
          predicates:
            - Path=/users/*/events/**
        # Публичный поиск событий
        - id: event_route_public
          uri: lb://event-service
          predicates:
            - Path=/events/**
        # Топ событий по рейтингу
        - id: event_route_top
          uri: lb://event-service
          predicates:
            - Path=/events/top-liked/**
        # Администрирование категорий
        - id: category_route_admin
          uri: lb://event-service
          predicates:
            - Path=/admin/categories/**
        # Публичные категории
        - id: category_route_public
          uri: lb://event-service
          predicates:
            - Path=/categories/**
        # Администрирование подборок
        - id: compilation_route_admin
          uri: lb://event-service
          predicates:
            - Path=/admin/compilations/**
        # Публичные подборки
        - id: compilation_route_public
          uri: lb://event-service
          predicates:
            - Path=/compilations/**

        # ==================== USER-SERVICE ====================
        # Список пользователей (корневой путь)
        - id: user_route_root
          uri: lb://user-service
          predicates:
            - Path=/admin/users
        # Все запросы к пользователям
        - id: user_route_all
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**

        # ==================== STATS-SERVER ====================
        # Статистика посещений
        - id: stats_route
          uri: lb://stats-server
          predicates:
            - Path=/stats/**
        # Фиксация просмотров (hits)
        - id: hit_route
          uri: lb://stats-server
          predicates:
            - Path=/hit/**

# Фиксированный порт API Gateway — единственная точка входа для клиентов
server:
  port: 8080

