server:
  port: 8080

spring:
  application:
    name: gateway-server

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true

      routes:
        # Маршрут для событий
        - id: events-route
          uri: lb://main-service
          predicates:
            - Path=/events/**
          filters:
            - name: CircuitBreaker
              args:
                name: mainServiceCircuitBreaker

        # Маршрут для категорий
        - id: categories-route
          uri: lb://main-service
          predicates:
            - Path=/categories/**
          filters:
            - name: CircuitBreaker
              args:
                name: mainServiceCircuitBreaker

        # Маршрут для пользователей
        - id: users-route
          uri: lb://main-service
          predicates:
            - Path=/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: mainServiceCircuitBreaker

        # Маршрут для подборок
        - id: compilations-route
          uri: lb://main-service
          predicates:
            - Path=/compilations/**
          filters:
            - name: CircuitBreaker
              args:
                name: mainServiceCircuitBreaker

        # Маршрут для запросов на участие
        - id: requests-route
          uri: lb://main-service
          predicates:
            - Path=/requests/**
          filters:
            - name: CircuitBreaker
              args:
                name: mainServiceCircuitBreaker

        # Маршрут для комментариев
        - id: comments-route
          uri: lb://main-service
          predicates:
            - Path=/comments/**
          filters:
            - name: CircuitBreaker
              args:
                name: mainServiceCircuitBreaker

eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    prefer-ip-address: true
  client:
    healthcheck:
      enabled: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,gateway,metrics,info
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.client.discovery: DEBUG