syntax = "proto3";

package stats.message.event;

option java_multiple_files = true;
// Каждый message/enum в отдельном Java-файле, пакет ru.practicum.ewm
option java_package = "ru.practicum.ewm.stats.proto.event";

/**
 * Тип действия пользователя с мероприятием.
 * Соответствует ActionTypeAvro в Avro-схеме.
 */
enum ActionTypeProto {
  ACTION_VIEW = 0;       // просмотр страницы мероприятия
  ACTION_REGISTER = 1;   // заявка на участие
  ACTION_LIKE = 2;       // лайк мероприятия
}
